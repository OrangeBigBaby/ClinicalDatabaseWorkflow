workflow:
  name: ClinicalDatabaseWorkflow
  version: 0.1.0
  public_outputs:
    - evidence_brief
    - topic_matrix
    - database_feasibility
    - analysis_contract
    - figure_specs
    - manuscript_shell
    - review_gate
  local_only_inputs:
    - downloaded_full_texts
    - private_data
    - strategy_notes
    - draft_manuscripts
    - third_party_tool_repositories

toolchain:
  local_dependencies_dir: external_projects
  tool_roles:
    - role: framework_figure_ideation
      purpose: convert manuscript logic into a framework figure specification
    - role: editable_diagram_generation
      purpose: rebuild figures and participant-selection flowcharts in editable form
    - role: scientific_writing_support
      purpose: support conservative scientific writing, polishing, citation checks, and figure-style review

references_and_local_dependencies:
  - name: paper-framework-figure-studio-pro
    purpose: framework figure ideation
  - name: Visiomaster
    purpose: editable figure reconstruction and flowchart rendering
  - name: nature-skills
    purpose: scientific writing, polishing, citation, and figure-style references
